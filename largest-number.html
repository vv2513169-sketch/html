<!DOCTYPE html>
<html>
<body>

<script>

let a=parseInt(prompt("Enter first number"));
let b=parseInt(prompt("Enter second number"));
let c=parseInt(prompt("Enter third number"));

if(a>b && a>c)
alert(a+" is largest");

else if(b>a && b>c)
alert(b+" is largest");

else if(c>a && c>b)
alert(c+" is largest");

else
alert("Equal numbers");

</script>
